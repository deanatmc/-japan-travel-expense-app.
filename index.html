<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>日本旅遊記帳</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><header><h1>🇯🇵 日本旅遊記帳</h1><p>打開就能看到既有紀錄，也可同步 Supabase。</p></header><main><section class="hero"><h2>旅行支出總覽</h2><p>既有紀錄立即顯示；連線後可匯入雲端。</p></section><section id="stats" class="stats"></section><section class="card"><h2>Supabase 連線設定</h2><div class="grid"><input id="supabaseUrl" placeholder="Project URL"><input id="supabaseKey" placeholder="Publishable / Anon Key"></div><div class="buttons"><button id="saveConfig">儲存並連線</button><button id="importHistory" class="light">匯入既有紀錄到 Supabase</button></div><div id="connectionPill">尚未連線</div></section><section class="card"><h2>新增單筆消費</h2><form id="expenseForm" class="form"><input name="date" type="date" required><input name="day" placeholder="Day 5" required><input name="store" placeholder="店家" required><input name="category" placeholder="類別" required><input name="name" placeholder="商品名稱" required><input name="qty" placeholder="數量"><input name="jpy" type="number" placeholder="日幣" required><input name="payment" placeholder="付款方式"><input name="note" placeholder="備註"><button type="submit">寫入 Supabase</button></form></section><section class="card"><h2>逐條對帳明細</h2><div class="toolbar"><input id="search" placeholder="搜尋商品、店家、類別"><select id="dayFilter"><option value="">全部日期</option></select></div><div id="status">目前顯示內建既有紀錄。</div><div id="expenseList"></div></section></main><script src="historical-data.js"></script><script src="app.js"></script></body></html>
