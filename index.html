<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本旅遊記帳 App</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🇯🇵 日本旅遊記帳 App</h1>
    <p>逐條對帳｜名稱・日幣・台幣</p>
  </header>

  <main>
    <section class="stats" id="stats"></section>

    <section class="panel">
      <h2>分類統計</h2>
      <div class="chips" id="categoryStats"></div>
    </section>

    <section class="panel">
      <h2>店家花費排行</h2>
      <div id="storeStats"></div>
    </section>

    <input id="search" placeholder="搜尋商品或店家：Nintendo、藥妝、皮克敏、拉麵">

    <section id="expenseList"></section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
