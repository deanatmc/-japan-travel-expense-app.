<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日本旅遊記帳</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header><h1>日本旅遊記帳</h1><p>完整逐項明細｜已預設 Supabase 連線</p></header>
<main>
<section id="stats" class="stats"></section>

<section class="card">
<div class="title-row">
  <div>
    <div class="eyebrow">LEDGER</div>
    <h2>完整逐條明細</h2>
  </div>
  <span id="connectionPill" class="pill">連線中</span>
</div>

<div class="filters">
<input id="search" placeholder="搜尋商品、店家、類別、付款方式">
<select id="dayFilter"><option value="">全部 Day</option></select>
<select id="storeFilter"><option value="">全部店家</option></select>
<button id="refreshBtn">重新整理</button>
</div>

<div id="status">正在連線 Supabase…</div>
<div id="detailList"></div>
</section>
</main>
<script src="app.js"></script>
</body>
</html>
