<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#4057c8"><title>日本旅遊記帳</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script></head>
<body><header class="topbar"><div><p class="eyebrow">OSAKA SLOW TRIP · 2026</p><h1>日本旅遊記帳</h1><p class="subtitle">Excel 匯入、Supabase 同步、逐項對帳。</p></div><span id="connectionPill" class="pill">連線中</span></header>
<main><section id="stats" class="stats"></section>
<section class="card"><div class="section-title"><div><small>QUICK ENTRY</small><h2>新增單筆支出</h2></div></div><form id="singleForm"><div class="grid four"><label>日期<input name="date" type="date" required></label><label>Day<input name="day" placeholder="Day 8" required></label><label>店家<input name="store" required></label><label>類別<input name="category" required></label><label class="span2">商品名稱<input name="name" required></label><label>數量<input name="qty" type="number" step="0.01"></label><label>日幣<input name="jpy" type="number" min="0" step="1" required></label><label>台幣<input name="twd" type="number" min="0" step="1" placeholder="留空自動換算"></label><label>付款方式<input name="payment"></label><label class="span2">備註<input name="note"></label></div><button class="primary wide" type="submit">寫入 Supabase</button></form></section>
<section class="card"><div class="section-title"><div><small>EXCEL IMPORT</small><h2>Excel 上傳</h2></div></div><div class="upload-box"><input id="excelFile" type="file" accept=".xlsx,.xls,.csv"><p>欄位：日期｜Day｜店家｜類別｜商品名稱｜數量｜日幣｜台幣｜付款方式｜備註｜建立時間</p></div><div class="button-row"><button id="previewBtn" class="secondary" type="button">預覽 Excel</button><button id="importBtn" class="primary" type="button" disabled>寫入 Supabase</button><button id="exportBtn" class="secondary" type="button">匯出目前資料</button></div><div id="importStatus" class="status">尚未選擇檔案。</div><div id="previewArea"></div></section>
<section class="card"><div class="section-title"><div><small>LEDGER</small><h2>完整逐條明細</h2></div><button id="refreshBtn" class="icon-btn" type="button">↻</button></div><div class="filters"><input id="search" placeholder="搜尋商品、店家、類別或付款方式"><select id="dayFilter"><option value="">全部 Day</option></select><select id="storeFilter"><option value="">全部店家</option></select></div><div id="status" class="status">正在讀取資料…</div><div id="detailList"></div></section>
<section id="dangerZone" class="card danger-card"><h2>資料管理</h2><p>清除前請先使用「匯出目前資料」備份。</p><button id="clearAllBtn" class="danger" type="button">清除 Supabase 全部明細</button></section></main>
<script src="config.js"></script><script src="app.js"></script></body></html>
